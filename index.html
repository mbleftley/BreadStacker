<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bread Stacker: The Real Yeast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <canvas id="top-canvas"></canvas>
        
        <div id="game-ui">
        <div id="score-container">
            <span id="score-label">SLICES STACKED</span>
            <div id="score-value">0</div>
        </div>

        <div id="combo-container">
            <div id="combo-text">YEAST MODE!</div>
            <div id="combo-dots"></div>
        </div>

        <div id="start-screen" class="overlay active">
            <h1>BREAD<br>STACKER</h1>
            <h2>THE REAL YEAST</h2>
            <p>Tap or Press SPACE to drop the slice.</p>
            <button id="start-button">START STACKING</button>
                <div id="start-footer">
                    <button id="show-leaderboard-btn" class="secondary-btn">GLOBAL RANKINGS</button>
                    <div id="footer-links">
                        <a href="https://buymeacoffee.com/mbleftleyi" target="_blank" class="bmc-button">
                            <span>☕ BUY ME A COFFEE</span>
                        </a>
                    </div>
                    <div class="developer-credit">
                        SYSTEM DEVELOPED BY <a href="https://x.com/MBLExperiment" target="_blank" style="color: inherit;">MBLXPERIMENT</a>
                    </div>
                </div>

        <div id="game-over-screen" class="overlay">
            <div class="spacer"></div>
            <div id="game-over-actions">
                <button id="restart-button">STACK BREAD</button>
                <button id="back-to-menu-button">BACK TO MENU</button>
            </div>
        </div>

        <div id="name-entry-overlay" class="overlay">
            <div id="name-input-container">
                <h2>TOP BREAD STACKER!</h2>
                <input type="text" id="player-name" placeholder="ENTER YOUR NAME" maxlength="15">
                <button id="submit-score-btn">SUBMIT TO GLOBAL</button>
                <button id="cancel-save-btn" class="text-btn">CANCEL</button>
            </div>
        </div>

        <div id="leaderboard-overlay" class="overlay">
            <div id="leaderboard-container">
                <h2>GLOBAL RANKINGS</h2>
                <div id="leaderboard-list">
                    <!-- Leaderboard items will be injected here -->
                </div>
                <button id="close-leaderboard-btn">BACK</button>
            </div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script src="game.js"></script>
</body>

</html>
